---
layout: default
---

<article class="post">
  <h1 class="blog-post-title">{{ page.title }}</h1>

  <div class="entry">
    <figure class="image animate-on-scroll load-hidden">
      <img src="/{{ page.featured-image }}" alt="{{ page.featured-image-credit }}">
      {% if page.featured-image-credit %}<figcaption class="caption">{{ page.featured-image-credit }}</figcaption>{% endif %}
    </figure>
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

</article>


<div class="prevnext">
{% if page.previous.url %}
    <a class="button-link prev" href="{{page.previous.url}}">&laquo; {{page.previous.title}}</a>
{% endif %}
{% if page.next.url %}
    <a class="button-link next" href="{{page.next.url}}">{{page.next.title}} &raquo;</a>
{% endif %}
</div>
